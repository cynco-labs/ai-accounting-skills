name: validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace structure
        run: python3 scripts/validate_marketplace.py
