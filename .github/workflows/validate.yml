name: validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate marketplace structure
        run: python3 scripts/validate_marketplace.py
      - name: Umbrella skill sync check
        run: python3 scripts/sync_umbrella.py --check
      - name: Golden fixture artifacts
        run: python3 scripts/validate_engagement_artifacts.py fixtures/golden-mini-sdn-bhd --strict-schema
      - name: Utterance routing evals
        run: python3 scripts/eval_utterance_routing.py --top-k 3
