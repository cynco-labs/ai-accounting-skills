name: bank-statement-intake
version: "0.0.1"
security_tier: prepare
schedule: "0 7 * * *"  # daily example
system_prompt_refs:
  - ../../shared/guardrails.md
  - ../../engagement-accounting/skills/source-documents/SKILL.md
tools_allow:
  - read_file
  - list_dir
  - write_file
tools_deny:
  - send_email
  - shell_network
inputs:
  inbox_glob: "${FIRM_CLIENTS_ROOT}/*/source/bank/inbox/*"
outputs:
  register_update: true
  auto_post_journals: false
